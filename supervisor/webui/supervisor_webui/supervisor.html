<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Supervisor</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #ffffff;
        --text: #1f2933;
        --muted: #5b6770;
        --border: #d0d7de;
        --header: #eef2f6;
        --accent: #0b6bcb;
        --danger: #c0392b;
        --ok: #2e8b57;
        --warn: #b9770e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", "Lucida Grande",
          sans-serif;
        color: var(--text);
        background: var(--bg);
        min-height: 100vh;
      }

      header {
        padding: 28px 6vw 18px 6vw;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 40px);
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      main {
        padding: 0 6vw 60px 6vw;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }

      thead th {
        text-align: left;
        font-size: 13px;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        padding: 12px 14px;
        background: var(--header);
        border-bottom: 1px solid var(--border);
      }

      tbody td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
        font-size: 14px;
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      tbody tr:nth-child(even) {
        background: #f9fbfc;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--muted);
      }

      .dot.ok {
        background: var(--ok);
      }

      .dot.warn {
        background: var(--warn);
      }

      .dot.unknown {
        background: var(--muted);
      }

      .dot.bad {
        background: var(--danger);
      }

      .meta {
        font-size: 13px;
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 12px;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        background: #ffffff;
        color: var(--text);
        cursor: pointer;
        transition: background 0.2s ease, border-color 0.2s ease;
      }

      button:hover {
        background: #f1f4f8;
        border-color: #c3c8cf;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      button.primary {
        background: var(--accent);
        color: #ffffff;
        border-color: transparent;
      }

      button.secondary {
        background: #ffffff;
        color: var(--accent);
        border-color: var(--accent);
      }

      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .toolbar button {
        font-weight: 600;
      }

      .error {
        background: #fbeaea;
        border: 1px solid #f4c7c7;
        padding: 12px 16px;
        border-radius: 12px;
        margin: 0 6vw 24px 6vw;
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Supervisor</h1>
      <div class="toolbar">
        <button class="secondary" id="refresh">Refresh</button>
        <button class="primary" id="restart-all">Restart All</button>
        <span id="timestamp" class="meta"></span>
      </div>
    </header>
    <div class="error" id="error"></div>
    <main>
      <table id="services">
        <thead>
          <tr>
            <th>Service</th>
            <th>Status</th>
            <th>Details</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="service-body"></tbody>
      </table>
    </main>
    <script>
      const tbody = document.getElementById("service-body");
      const errorEl = document.getElementById("error");
      const timestampEl = document.getElementById("timestamp");
      const rowMap = new Map();

      const statusClass = (state) => {
        const normalized = state.toLowerCase();
        if (normalized === "running") return "ok";
        if (normalized === "unknown") return "unknown";
        if (normalized === "starting" || normalized === "stopping") return "warn";
        if (normalized === "stopped") return "warn";
        return "bad";
      };

      const ensureRow = (svc) => {
        const existing = rowMap.get(svc.name);
        if (existing) return existing;

        const row = document.createElement("tr");
        row.dataset.name = svc.name;

        const nameCell = document.createElement("td");
        nameCell.textContent = svc.name;

        const statusCell = document.createElement("td");
        const statusWrap = document.createElement("span");
        statusWrap.className = "status";
        const dot = document.createElement("span");
        dot.className = "dot";
        const label = document.createElement("span");
        statusWrap.append(dot, label);
        statusCell.appendChild(statusWrap);

        const detailsCell = document.createElement("td");
        detailsCell.className = "meta";

        const actionsCell = document.createElement("td");
        const actions = document.createElement("div");
        actions.className = "actions";

        for (const action of ["start", "stop", "restart"]) {
          const button = document.createElement("button");
          button.textContent = action;
          button.addEventListener("click", () => runAction(svc.name, action, [button]));
          actions.appendChild(button);
        }

        actionsCell.appendChild(actions);
        row.append(nameCell, statusCell, detailsCell, actionsCell);
        tbody.appendChild(row);

        const refs = { row, dot, label, detailsCell, buttons: [...actions.children] };
        rowMap.set(svc.name, refs);
        return refs;
      };

      const renderServices = (payload) => {
        const services = payload.services || [];
        const seen = new Set();

        for (const svc of services) {
          seen.add(svc.name);
          const refs = ensureRow(svc);
          refs.dot.className = `dot ${statusClass(svc.state)}`;
          refs.label.textContent = svc.state;
          refs.detailsCell.textContent = svc.description || "No details";
        }

        for (const [name, refs] of rowMap.entries()) {
          if (seen.has(name)) continue;
          refs.row.remove();
          rowMap.delete(name);
        }

        const suffix = payload.hostname ? ` on ${payload.hostname}` : "";
        timestampEl.textContent = `Last refresh${suffix}: ${new Date().toLocaleTimeString()}`;
      };

      const setError = (message) => {
        if (!message) {
          errorEl.style.display = "none";
          errorEl.textContent = "";
          return;
        }

        errorEl.style.display = "block";
        errorEl.textContent = message;
      };

      const setBusy = (buttons, busy) => {
        for (const button of buttons) {
          button.disabled = busy;
        }
      };

      const loadServices = async () => {
        setError("");
        try {
          const response = await fetch("/api/services");
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.details || payload.error || "Request failed");
          }
          renderServices(payload);
        } catch (error) {
          setError(error.message || "Failed to load supervisor state");
        }
      };

      const runAction = async (name, action, buttons) => {
        setError("");
        setBusy(buttons, true);
        try {
          const response = await fetch(`/api/services/${name}/${action}`, {
            method: "POST",
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.details || payload.error || "Action failed");
          }
          await loadServices();
        } catch (error) {
          setError(error.message || "Action failed");
        } finally {
          setBusy(buttons, false);
        }
      };

      const restartAll = async () => {
        const button = document.getElementById("restart-all");
        setError("");
        setBusy([button], true);
        try {
          const response = await fetch("/api/services/restart-all", {
            method: "POST",
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.details || payload.error || "Restart failed");
          }
          await loadServices();
        } catch (error) {
          setError(error.message || "Restart failed");
        } finally {
          setBusy([button], false);
        }
      };

      document.getElementById("refresh").addEventListener("click", loadServices);
      document.getElementById("restart-all").addEventListener("click", restartAll);

      loadServices();
    </script>
  </body>
</html>
