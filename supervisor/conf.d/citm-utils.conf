[program:citm-utils-web]
directory=/citm-utils
command=uv run gunicorn -w 4 -b 0.0.0.0:%(ENV_CITM_UTILS_WEB_PORT)s --enable-stdio-inheritance app:app
autostart=true
autorestart=true
startretries=3
user=root

stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

stopsignal=TERM

[program:citm-utils-dns-forwarder]
directory=/citm-utils
command=uv run python -m service_discovery.dns_forwarder
autostart=true
autorestart=true
startretries=3
user=root

stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

stopsignal=TERM
