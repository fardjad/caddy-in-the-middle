site_name: Caddy in the Middle
docs_dir: src
site_url: https://fardjad.com/caddy-in-the-middle/
repo_url: https://github.com/fardjad/caddy-in-the-middle
repo_name: fardjad/caddy-in-the-middle

theme:
  name: material
  palette:
    - scheme: default
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["../testcontainers/python"]

nav:
  - Home: index.md
  - Tutorials:
    - Getting Started: tutorials/getting-started.md
    - Gateway and Sidecars: tutorials/gateway-and-sidecars.md
    - HTTP Proxy and DNS Forwarder: tutorials/http-proxy-and-dns-forwarder.md
    - Mocking: tutorials/mocking.md
  - How-To Guides:
    - Inspect Traffic and Export HAR: how-to/inspect-traffic-and-export-har.md
    - Configure Service Discovery: how-to/configure-service-discovery.md
    - Author Mock Templates: how-to/author-mock-templates.md
    - Development Root CA Generation: how-to/create-dev-root-ca.md
  - Reference:
    - Runtime Configuration: reference/runtime-configuration.md
    - Network and Port Contracts: reference/network-and-port-contracts.md
    - Admin API: reference/admin-api.md
    - Caddy and MITM Routing Contract: reference/caddy-and-mitm-routing-contract.md
    - Mock Template Format: reference/mock-template-format.md
  - Explanation:
    - Architecture: explanation/architecture.md
    - Request Flow: explanation/request-flow.md
    - DNS Discovery and Forwarding: explanation/dns-discovery-and-forwarding.md
    - Mocking and Rewrite Pipeline: explanation/mocking-and-rewrite-pipeline.md
    - Gateway vs Sidecar Topologies: explanation/gateway-vs-sidecar-topologies.md
