name: CI

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - name: Set up Go
        uses: actions/setup-go@main
        with:
          go-version: stable
          check-latest: true

      - name: Set up Python
        uses: actions/setup-python@main
        with:
          python-version: '3.x'
          check-latest: true

      - name: Set up Node
        uses: actions/setup-node@main
        with:
          node-version: 'lts/*'
          check-latest: true

      - name: Install dependencies
        run: |
          set -euxo pipefail

          # Install Go-based tooling from latest upstream module versions.
          go install github.com/cloudflare/cfssl/cmd/...@latest
          go install github.com/reteps/dockerfmt@latest
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
          go install github.com/caddyserver/caddy/v2/cmd/caddy@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

          # Install Node tooling.
          npm install -g rust-just dclint

          # Install Python tooling.
          python -m pip install --upgrade pip uv black

          just --version
          go version
          node --version
          npm --version
          python --version
          cfssl version
          command -v cfssljson
          dockerfmt version
          shfmt --version
          caddy version
          black --version
          uv --version
          dclint --version
          docker --version
          docker compose version

      - name: Run checks
        run: just check

      - name: Run test workflow
        run: just test
